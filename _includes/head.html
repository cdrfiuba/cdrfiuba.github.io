<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="shortcut icon" href="{{ "/assets/ico/favicon.ico" | prepend: site.baseurl }}">

    <title>{{ site.title }}{% if page.title %} - {{ page.title }}{% endif %}</title>
    <link rel="canonical" href="{{ page.url | prepend: site.url }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
    <meta property="og:url" content="{{ page.url | prepend: site.url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:locale" content="es_AR">
    {% if page.img %}<meta property="og:image" content="{{ page.img | prepend: site.baseurl | prepend: site.url }}">
    {% else %}<meta property="og:image" content="{{ "/assets/img/logo.png" | prepend: site.baseurl | prepend: site.url }}">
    {% endif %}
    <meta name="twitter:card" content="summary_large_image">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;900&family=Raleway:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="{{ "/assets/css/site.css" | prepend: site.baseurl }}" rel="stylesheet">

    <!-- Add custom css to specific pages -->
    {% if page.custom_css %}
    <link href="{{ "/assets/css/" | append: page.custom_css | append: ".css" | prepend: site.baseurl }}" rel="stylesheet">
    {% endif %}

</head>
