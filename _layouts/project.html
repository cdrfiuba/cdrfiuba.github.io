{% include wrap.html %}

<div class="container mt">
    <div class="row">

        {% include carousel.html %}

        <div class="col-lg-5 col-lg-offset-1">
            <div class="spacing"></div>

            {{ content }}

        </div>
        <div class="col-lg-4 col-lg-offset-1">
            <div class="spacing"></div>
            <h4>Detalles del Proyecto</h4>

            <p><b>Fecha:</b> {{ page.date | date: "%b %-d, %Y" }}</p>
            <p><b>Autor:</b> {{ page.author }}</p>
            <p><b>Repositorio:</b> <a href="{{ page.website }}">{{ page.website }}</a></p>
        </div>
    </div><!-- /row -->
</div><!-- /container -->
