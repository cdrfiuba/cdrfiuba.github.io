---
layout: default
---

{% include wrap.html %}

<div class="container mtb content-tight">
    <div class="row">
        <article class="col-lg-8">
            <h1>{% if page.post_title %}{{ page.post_title }}{% else %}{{ page.title }}{% endif %}</h1>
            <p><time datetime="{{ page.date | date_to_xmlschema }}" class="csmall">{{ page.date | date: "%b %-d, %Y" }}</time></p>
            <div class="post-img-wrap post-img-wrap--detail">
                <img src="{{ "/assets/img/blog/" | prepend: site.baseurl }}{{ page.img }}" alt="{% if page.post_title %}{{ page.post_title }}{% else %}{{ page.title }}{% endif %}">
            </div>

            {{ content }}

            <div class="spacing"></div>

            <!-- Utterances Comments -->
            <script src="https://utteranc.es/client.js"
                    repo="cdrfiuba/cdrfiuba.github.io"
                    issue-term="pathname"
                    theme="github-light"
                    crossorigin="anonymous"
                    async>
            </script>
        </article><!-- /col-lg-8 -->
        
        {% include sidebar.html %}

    </div><!-- /row -->
</div><!-- /container -->
